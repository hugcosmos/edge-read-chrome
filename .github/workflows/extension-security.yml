name: 浏览器插件安全自动化检测
run-name: 安全扫描 - ${{ github.event.head_commit.message }}

# 触发条件：推送到main分支、创建PR、手动触发
on:
  push:
    branches: [ main ]
    paths:
      - '**.js'
      - '**.json'
      - '**.html'
      - '**.css'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许在GitHub界面手动触发

# 权限配置（仅授予必要权限）
permissions:
  contents: read
  security-events: write  # 用于CodeQL上传结果
  pull-requests: write    # 用于在PR中添加评论

jobs:
  # 1. Chrome扩展规范检测
  official-linter:
    name: 官方扩展规范检测
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装Chrome Extension Linter
        run: npm install -g @chiragrupani/extension-linter

      - name: 运行Chrome Extension Linter
        run: extension-linter ./ --format github
        continue-on-error: false  # 官方错误必须修复

  # 2. Semgrep静态代码分析（浏览器插件专用规则集）
  semgrep-scan:
    name: Semgrep安全扫描
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行Semgrep扫描
        uses: semgrep/semgrep-action@v1
        with:
          # 使用专门针对Chrome扩展的安全规则集
          config: >-
            p/chrome-extension-security
            p/javascript
            p/security
          # 仅报告错误级别问题
          severity: ERROR

  # 3. CodeQL深度代码分析
  codeql-analyze:
    name: CodeQL深度代码扫描
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 初始化CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # 添加安全扩展查询集
          queries: +security-extended,security-and-quality

      - name: 自动构建代码
        uses: github/codeql-action/autobuild@v3

      - name: 运行CodeQL分析
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # 4. 安全扫描结果汇总
  security-summary:
    name: 安全扫描结果汇总
    runs-on: ubuntu-latest
    needs: [official-linter, semgrep-scan, codeql-analyze]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: 生成安全报告摘要
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              officialLinter: ${{ needs.official-linter.result }},
              semgrep: ${{ needs.semgrep-scan.result }},
              codeql: ${{ needs.codeql-analyze.result }}
            };

            const statusEmoji = {
              success: '✅',
              failure: '❌',
              cancelled: '⚠️',
              skipped: '⏭️'
            };

            let summary = '## 🛡️ 浏览器插件安全扫描结果汇总\n\n';
            summary += '| 检测项目 | 状态 |\n';
            summary += '|---------|------|\n';
            summary += `| 官方扩展规范检测 | ${statusEmoji[results.officialLinter]} ${results.officialLinter} |\n`;
            summary += `| Semgrep静态代码分析 | ${statusEmoji[results.semgrep]} ${results.semgrep} |\n`;
            summary += `| CodeQL深度代码扫描 | ${statusEmoji[results.codeql]} ${results.codeql} |\n\n`;

            if (Object.values(results).some(r => r === 'failure')) {
              summary += '⚠️ **部分安全检测未通过，请查看详细报告并修复问题后再合并**\n\n';
              summary += '### 查看详细结果\n';
              summary += '- 点击本次工作流运行查看每个步骤的详细输出\n';
              summary += '- 在仓库的"Security" > "Code scanning"中查看所有漏洞报告\n';
            } else {
              summary += '✅ **所有安全检测均已通过，可以安全合并**\n';
            }

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });
